<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tái phí - LMS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ── Split layout (reuse students pattern) ── */
    .rv-split { display: flex; flex: 1; overflow: hidden; }

    /* Left panel */
    .rv-left { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; background: var(--bg-card); overflow: hidden; }
    .rv-left-hd { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
    .rv-left-hd-title { font-weight: 700; font-size: 14px; color: var(--text-primary); margin-bottom: 8px; }

    /* Stats pills */
    .rv-pills { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .rv-pill { padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1.5px solid transparent; background: var(--bg-secondary);
      color: var(--text-secondary); transition: all .15s; white-space: nowrap; }
    .rv-pill:hover { border-color: var(--primary); color: var(--primary); }
    .rv-pill.warn   { background: #fef3c7; color: #d97706; }
    .rv-pill.danger { background: #fee2e2; color: #dc2626; }
    .rv-pill.success{ background: #dcfce7; color: #16a34a; }
    .rv-pill.active { background: var(--primary, #3b82f6) !important; color: #fff !important; border-color: transparent !important; }

    /* Search + filters */
    .rv-search { padding: 8px 12px; border-bottom: 1px solid var(--border); position: relative; }
    .rv-search i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 13px; }
    .rv-search input { width: 100%; padding: 7px 10px 7px 32px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; background: var(--bg-secondary); color: var(--text-primary);
      outline: none; box-sizing: border-box; }
    .rv-search input:focus { border-color: var(--primary); }
    .rv-filters { padding: 7px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; }
    .rv-filters select { flex: 1; font-size: 12px; padding: 5px 6px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; }

    /* List */
    .rv-list { flex: 1; overflow-y: auto; }
    .rv-pg { padding: 8px 12px; border-top: 1px solid var(--border); }

    /* List item */
    .rli { display: flex; align-items: stretch; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background .1s; position: relative; }
    .rli:hover { background: var(--bg-secondary); }
    .rli.active { background: rgba(52,168,83,.07); }
    .rli-bar { width: 4px; flex-shrink: 0; }
    .rli-body { flex: 1; padding: 10px 12px; min-width: 0; }
    .rli-name { font-weight: 600; font-size: 13px; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rli-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .rli-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; gap: 6px; flex-wrap: wrap; }
    .rli-badge { padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
    .rli-badge.expired  { background: #fee2e2; color: #dc2626; }
    .rli-badge.expiring { background: #fef3c7; color: #d97706; }
    .rli-badge.renewed  { background: #dcfce7; color: #16a34a; }
    .rli-badge.ses-lo   { background: #fee2e2; color: #dc2626; }
    .rli-badge.ses-ok   { background: #dcfce7; color: #16a34a; }
    [data-theme=dark] .rli-badge.expired  { background: rgba(220,38,38,.18); color: #f87171; }
    [data-theme=dark] .rli-badge.expiring { background: rgba(217,119,6,.18); color: #fbbf24; }
    [data-theme=dark] .rli-badge.renewed  { background: rgba(22,163,74,.18); color: #4ade80; }
    [data-theme=dark] .rli-badge.ses-lo   { background: rgba(220,38,38,.18); color: #f87171; }
    [data-theme=dark] .rli-badge.ses-ok   { background: rgba(22,163,74,.18); color: #4ade80; }

    /* Right panel */
    .rv-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-secondary); }
    .rv-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--text-secondary); gap: 12px; }
    .rv-empty i { font-size: 48px; opacity: .25; }
    .rv-empty p  { font-size: 14px; margin: 0; }
    .rv-detail { flex: 1; overflow-y: auto; }

    /* Hero */
    .rvd-hero { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 16px 20px; }
    .rvd-hero-top { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .rvd-av { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .rvd-name { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .rvd-sub  { font-size: 12px; color: var(--text-secondary); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }

    /* Sections */
    .rvd-body { padding: 16px 20px; }
    .rvd-sec { background: var(--bg-card); border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
    .rvd-sec-hd { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 600;
      font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
    .rvd-sec-bd { padding: 14px; }
    .rvd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rvd-item label { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; display: block; }
    .rvd-item .val  { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .rvd-item.full  { grid-column: 1/-1; }

    /* Renewal type */
    .rtype-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rtype-opt { border: 2px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer;
      transition: all .15s; text-align: center; background: var(--bg-secondary); }
    .rtype-opt:hover { border-color: #94a3b8; }
    .rtype-opt.selected { border-color: #22c55e; background: rgba(34,197,94,.07); }
    .rtype-opt .ri { font-size: 20px; margin-bottom: 5px; }
    .rtype-opt .rt { font-weight: 600; font-size: 13px; color: var(--text-primary); }
    .rtype-opt .rd { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

    /* Package list */
    .pkg-list { display: flex; flex-direction: column; gap: 8px; }
    .pkg-opt { border: 2px solid var(--border); border-radius: 9px; padding: 11px 13px; cursor: pointer;
      transition: all .15s; display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-secondary); }
    .pkg-opt:hover { border-color: #94a3b8; }
    .pkg-opt.selected { border-color: #22c55e; background: rgba(34,197,94,.07); }
    .pkg-opt .pn { font-weight: 600; font-size: 13px; color: var(--text-primary); }
    .pkg-opt .pm { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .pkg-opt .pp { font-weight: 700; color: #16a34a; font-size: 14px; flex-shrink: 0; }

    /* Payment status */
    .pay-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
    .pay-opt { border: 2px solid var(--border); border-radius: 8px; padding: 7px 8px; cursor: pointer;
      text-align: center; font-size: 12px; font-weight: 600; transition: all .15s;
      color: var(--text-secondary); background: var(--bg-secondary); }
    .pay-opt:hover { border-color: #94a3b8; }
    .pay-opt.selected { border-color: #3b82f6; background: rgba(59,130,246,.08); color: #2563eb; }

    /* Fee summary */
    .fee-sum { background: rgba(34,197,94,.07); border: 1px solid rgba(34,197,94,.2);
      border-radius: 10px; padding: 12px 14px; }
    .fee-row { display: flex; justify-content: space-between; padding: 5px 0;
      border-bottom: 1px dashed rgba(34,197,94,.2); font-size: 13px; color: var(--text-primary); }
    .fee-row:last-child { border: none; font-weight: 700; font-size: 14px; color: #16a34a; padding-top: 8px; }

    /* Form controls inside right panel */
    .rvd-sec-bd label { font-size: 12px; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 5px; display: block; }
    .rvd-sec-bd .form-control { width: 100%; padding: 8px 11px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; background: var(--bg-secondary); color: var(--text-primary);
      box-sizing: border-box; }
    .rvd-sec-bd .form-control:focus { outline: none; border-color: #22c55e; }
    .rvd-sec-bd .fg { margin-bottom: 12px; }
    .rvd-sec-bd .fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

    /* Action footer */
    .rvd-footer { background: var(--bg-card); border-top: 1px solid var(--border);
      padding: 12px 20px; display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<main class="main-content">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-sync-alt"></i> Tái phí</h1>
    </div>
    <div class="topbar-right">
      <button class="btn btn-secondary" onclick="loadData()"><i class="fas fa-sync"></i></button>
    </div>
  </div>

  <div class="rv-split">
    <!-- Left panel -->
    <div class="rv-left">
      <div class="rv-left-hd">
        <div class="rv-left-hd-title">Danh sách cần tái phí</div>
      </div>

      <!-- Status pills -->
      <div class="rv-pills" id="rvPills">
        <span class="rv-pill active" data-f="all" onclick="filterStatus('all')">Tất cả <span id="cntAll">0</span></span>
        <span class="rv-pill expiring" data-f="expiring" onclick="filterStatus('expiring')">Sắp hết <span id="cntExpiring">0</span></span>
        <span class="rv-pill expired"  data-f="expired"  onclick="filterStatus('expired')">Hết phí <span id="cntExpired">0</span></span>
        <span class="rv-pill renewed"  data-f="renewed"  onclick="filterStatus('renewed')">Đã tái phí <span id="cntRenewed">0</span></span>
      </div>

      <!-- Search -->
      <div class="rv-search">
        <i class="fas fa-search"></i>
        <input type="text" id="rvSearch" placeholder="Tìm tên, mã, SĐT..." oninput="renderList()">
      </div>

      <!-- Filters -->
      <div class="rv-filters">
        <input type="month" id="fMonth" class="form-control" style="font-size:12px;padding:5px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg-secondary);color:var(--text-primary)" onchange="loadData()">
        <select id="fBranch" onchange="loadData()"><option value="">Tất cả CS</option></select>
      </div>

      <!-- List -->
      <div class="rv-list" id="rvList">
        <div style="padding:20px;text-align:center;color:var(--text-secondary)"><i class="fas fa-spinner fa-spin"></i></div>
      </div>
      <div class="rv-pg" id="rvPg"></div>
    </div>

    <!-- Right panel -->
    <div class="rv-right" id="rvRight">
      <div class="rv-empty">
        <i class="fas fa-sync-alt"></i>
        <p>Chọn học viên để thực hiện tái phí</p>
      </div>
    </div>
  </div>
</main>

<script src="../js/config.js"></script>
<script src="../js/app.js?v=4.1"></script>
<script src="../js/reactive.js?v=4.1"></script>
<script src="../js/crud-mixin.js?v=4.1"></script>
<script src="../js/sidebar.js?v=4.4"></script>
<script>
  let allStudents = [], packages = [], promotions = [], allClasses = [];
  let curStudent = null, selPkg = null;
  let rType = 'extend', payStatus = 'pending';
  let curFilter = 'all', curPage = 1, totalPages = 1;

  document.getElementById('fMonth').value = new Date().toISOString().slice(0,7);

  async function init() {
    await auth.requireAuth();
    buildSidebar('sidebar');
    await Promise.all([loadBranches(), loadClasses(), loadPackages(), loadPromotions()]);
    await loadData();
  }

  async function loadBranches() {
    try {
      const res = await api.get('/branches');
      const sel = document.getElementById('fBranch');
      (res.data||[]).forEach(b => sel.innerHTML += `<option value="${b.id}">${b.code} - ${b.name}</option>`);
    } catch(e) {}
  }

  async function loadClasses() {
    try {
      const res = await api.get('/classes?status=active&limit=200');
      allClasses = res.data || [];
    } catch(e) {}
  }

  async function loadPackages() {
    try {
      const branchId = auth.user?.primaryBranch?.id || auth.user?.branches?.[0]?.id || '';
      const res = await api.get('/packages?is_active=1' + (branchId ? '&branchId='+branchId : ''));
      packages = res.data || [];
    } catch(e) {}
  }

  async function loadPromotions() {
    try {
      const res = await api.get('/promotions?is_active=1');
      promotions = res.data || [];
    } catch(e) {}
  }

  async function loadData() {
    const month    = document.getElementById('fMonth').value;
    const branchId = document.getElementById('fBranch').value;
    document.getElementById('rvList').innerHTML =
      '<div style="padding:20px;text-align:center;color:var(--text-secondary)"><i class="fas fa-spinner fa-spin"></i></div>';
    try {
      const p = new URLSearchParams({ month, page: curPage, limit: 50 });
      if (branchId) p.append('branchId', branchId);
      const res = await api.get('/renewals/students?' + p);
      allStudents = res.data?.students || [];
      const stats = res.data?.stats   || {};
      const pg    = res.data?.pagination || {};

      document.getElementById('cntAll').textContent      = stats.total    || 0;
      document.getElementById('cntExpiring').textContent = stats.expiring || 0;
      document.getElementById('cntExpired').textContent  = stats.expired  || 0;
      document.getElementById('cntRenewed').textContent  = stats.renewed  || 0;

      curPage    = pg.page || 1;
      totalPages = pg.totalPages || 1;
      renderList();
      renderPg();
    } catch(e) {
      document.getElementById('rvList').innerHTML =
        `<div style="padding:20px;text-align:center;color:#dc2626">Lỗi: ${e.message}</div>`;
    }
  }

  function filterStatus(f) {
    curFilter = f;
    document.querySelectorAll('.rv-pill').forEach(el => el.classList.toggle('active', el.dataset.f === f));
    renderList();
  }

  function renderList() {
    const q = document.getElementById('rvSearch').value.toLowerCase();
    let list = allStudents;
    if (curFilter !== 'all') list = list.filter(s => s.status === curFilter);
    if (q) list = list.filter(s =>
      (s.full_name||'').toLowerCase().includes(q) ||
      (s.student_code||'').toLowerCase().includes(q) ||
      (s.parent_phone||'').includes(q)
    );

    if (!list.length) {
      document.getElementById('rvList').innerHTML =
        '<div style="padding:20px;text-align:center;color:var(--text-secondary)">Không có dữ liệu</div>';
      return;
    }

    const barColor = { expired:'#dc2626', expiring:'#d97706', renewed:'#22c55e', active:'#3b82f6' };
    document.getElementById('rvList').innerHTML = list.map(s => {
      const init   = (s.full_name||'HV').trim().split(' ').map(w=>w[0]).join('').slice(-2).toUpperCase();
      const rem    = s.remaining_sessions || 0;
      const sesCls = rem <= 4 ? 'ses-lo' : 'ses-ok';
      const color  = barColor[s.status] || '#9ca3af';
      const feeStr = s.fee_end_date ? new Date(s.fee_end_date).toLocaleDateString('vi-VN') : '-';
      const isAct  = curStudent?.id === s.id;

      let stBadge = '';
      if      (s.status==='expired')  stBadge = '<span class="rli-badge expired">Hết phí</span>';
      else if (s.status==='expiring') stBadge = '<span class="rli-badge expiring">Sắp hết</span>';
      else if (s.status==='renewed')  stBadge = '<span class="rli-badge renewed">Đã tái phí</span>';

      return `<div class="rli ${isAct?'active':''}" onclick="selectStudent(${s.id})">
        <div class="rli-bar" style="background:${color}"></div>
        <div class="rli-body">
          <div class="rli-name">${s.full_name}</div>
          <div class="rli-meta">${s.student_code||''} • ${s.class_name||'Chưa xếp lớp'}</div>
          <div class="rli-foot">
            <span class="rli-badge ${sesCls}">${rem} buổi</span>
            <span style="font-size:10px;color:var(--text-secondary)">${feeStr}</span>
            ${stBadge}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function renderPg() {
    const el = document.getElementById('rvPg');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    el.innerHTML = `<div style="display:flex;gap:6px;align-items:center;justify-content:center;font-size:12px">
      <button onclick="changePage(${curPage-1})" ${curPage<=1?'disabled':''} style="border:1px solid var(--border);background:var(--bg-secondary);border-radius:5px;padding:3px 8px;cursor:pointer">‹</button>
      <span>${curPage}/${totalPages}</span>
      <button onclick="changePage(${curPage+1})" ${curPage>=totalPages?'disabled':''} style="border:1px solid var(--border);background:var(--bg-secondary);border-radius:5px;padding:3px 8px;cursor:pointer">›</button>
    </div>`;
  }

  function changePage(p) {
    if (p<1||p>totalPages||p===curPage) return;
    curPage = p; loadData();
  }

  function selectStudent(id) {
    curStudent = allStudents.find(s => s.id === id);
    document.querySelectorAll('.rli').forEach(el => el.classList.remove('active'));
    [...document.querySelectorAll('.rli')].find(el => el.onclick?.toString().includes(`selectStudent(${id})`))?.classList.add('active');
    renderDetail();
  }

  function renderDetail() {
    if (!curStudent) return;
    const s    = curStudent;
    const init = (s.full_name||'HV').trim().split(' ').map(w=>w[0]).join('').slice(-2).toUpperCase();
    const barColor = { expired:'#dc2626', expiring:'#d97706', renewed:'#22c55e', active:'#3b82f6' };
    const color = barColor[s.status] || '#9ca3af';
    const rem   = s.remaining_sessions || 0;
    const sesCls= rem <= 4 ? 'rli-badge ses-lo' : 'rli-badge ses-ok';
    const feeColor = s.status==='expired' ? '#dc2626' : s.status==='expiring' ? '#d97706' : 'inherit';

    // Reset form state
    selPkg    = null;
    rType     = 'extend';
    payStatus = 'pending';

    document.getElementById('rvRight').innerHTML = `
      <div class="rv-detail" id="rvDetailContent">
        <!-- Hero -->
        <div class="rvd-hero">
          <div class="rvd-hero-top">
            <div class="rvd-av" style="background:${color}">${init}</div>
            <div style="flex:1;min-width:0">
              <div class="rvd-name">${s.full_name}</div>
              <div class="rvd-sub">
                <span>${s.student_code||''}</span>
                <span>${s.parent_phone||''}</span>
                <span class="${sesCls}">${rem} buổi còn</span>
              </div>
            </div>
          </div>
        </div>

        <div class="rvd-body">
          <!-- Thông tin hiện tại -->
          <div class="rvd-sec">
            <div class="rvd-sec-hd"><i class="fas fa-info-circle" style="color:#3b82f6"></i> Thông tin hiện tại</div>
            <div class="rvd-sec-bd">
              <div class="rvd-grid">
                <div class="rvd-item"><label>Lớp hiện tại</label><div class="val">${s.class_name||'Chưa xếp lớp'}</div></div>
                <div class="rvd-item"><label>CM quản lý</label><div class="val">${s.cm_name||'-'}</div></div>
                <div class="rvd-item"><label>Gói học phí</label><div class="val">${s.package_name||'-'}</div></div>
                <div class="rvd-item"><label>Tiến độ buổi</label><div class="val">${s.completed_sessions||0} / ${s.total_sessions||0} buổi</div></div>
                <div class="rvd-item"><label>Buổi còn lại</label><div class="val"><span class="${sesCls}">${rem} buổi</span></div></div>
                <div class="rvd-item"><label>Ngày hết phí</label><div class="val" style="color:${feeColor};font-weight:600">${s.fee_end_date ? new Date(s.fee_end_date).toLocaleDateString('vi-VN') : '-'}${s.days_remaining!==null&&s.days_remaining!==undefined ? ` <span style="font-size:11px;font-weight:400;color:${s.days_remaining<0?'#dc2626':'#6b7280'}">(${s.days_remaining>0?'còn '+s.days_remaining:'quá '+Math.abs(s.days_remaining)} ngày)</span>` : ''}</div></div>
              </div>
            </div>
          </div>

          ${s.status === 'renewed'
            ? `<div class="rvd-sec"><div class="rvd-sec-bd" style="padding:20px;text-align:center;color:var(--text-secondary)">
                <i class="fas fa-check-circle" style="font-size:32px;color:#22c55e;display:block;margin-bottom:8px"></i>
                Học viên đã được tái phí trong tháng này
               </div></div>`
            : renderRenewalForm(s)
          }
        </div>
      </div>
      ${s.status !== 'renewed' ? `
      <div class="rvd-footer">
        <button class="btn btn-secondary" onclick="selectStudent(null);document.getElementById('rvRight').innerHTML='<div class=rv-empty><i class=\\'fas fa-sync-alt\\'></i><p>Chọn học viên để thực hiện tái phí</p></div>'">Đóng</button>
        <button class="btn btn-primary" id="rnwSubmitBtn" onclick="submitRenewal()"><i class="fas fa-check"></i> Xác nhận tái phí</button>
      </div>` : ''}
    `;

    // Bind events after render
    bindFormEvents();
  }

  function renderRenewalForm(s) {
    // Build package options
    const pkgHtml = packages.length
      ? packages.filter(p => !s.subject_id || !p.subject_id || p.subject_id === s.subject_id)
          .map(p => `<div class="pkg-opt" id="pkg_${p.id}" onclick="selectPkg(${p.id})">
            <div><div class="pn">${p.name}</div><div class="pm">${p.months||0} tháng • ${p.sessions_count||p.sessions||0} buổi</div></div>
            <div class="pp">${fmtCur(p.price||p.base_price)}</div>
          </div>`).join('')
      : '<div style="color:var(--text-secondary);font-size:13px">Không có gói học</div>';

    // Promotion options
    const promoHtml = `<option value="">Không áp dụng</option>` +
      promotions.map(p => {
        const desc = p.discount_type==='percent' ? p.discount_value+'%' : fmtCur(p.discount_value);
        return `<option value="${p.id}" data-type="${p.discount_type}" data-val="${p.discount_value}">${p.name} (-${desc})</option>`;
      }).join('');

    // Class options for "new" type
    const clsHtml = '<option value="">-- Chọn lớp --</option>' +
      allClasses.filter(c => !s.subject_id||!c.subject_id||c.subject_id===s.subject_id)
        .map(c => `<option value="${c.id}">${c.class_name}</option>`).join('');

    return `
      <!-- Loại gia hạn -->
      <div class="rvd-sec">
        <div class="rvd-sec-hd"><i class="fas fa-redo" style="color:#22c55e"></i> Tái phí / Gia hạn</div>
        <div class="rvd-sec-bd">
          <div class="fg">
            <label>Loại gia hạn</label>
            <div class="rtype-row">
              <div class="rtype-opt selected" id="rt_extend" onclick="selectRType('extend')">
                <div class="ri" style="color:#3b82f6"><i class="fas fa-plus-circle"></i></div>
                <div class="rt">Gia hạn thêm</div>
                <div class="rd">Thêm vào lộ trình hiện tại</div>
              </div>
              <div class="rtype-opt" id="rt_new" onclick="selectRType('new')">
                <div class="ri" style="color:#22c55e"><i class="fas fa-redo"></i></div>
                <div class="rt">Khóa mới</div>
                <div class="rd">Đăng ký khóa học kế tiếp</div>
              </div>
            </div>
          </div>

          <div class="fg" id="newClassFg" style="display:none">
            <label>Lớp mới <span style="color:#dc2626">*</span></label>
            <select class="form-control" id="newClassSel">${clsHtml}</select>
          </div>

          <div class="fg">
            <label>Chọn gói học <span style="color:#dc2626">*</span></label>
            <div class="pkg-list">${pkgHtml}</div>
          </div>

          <div class="fg2">
            <div>
              <label>Khuyến mãi</label>
              <select class="form-control" id="promoSel" onchange="calcFee()">${promoHtml}</select>
            </div>
            <div>
              <label>Học bổng (tháng)</label>
              <input type="number" class="form-control" id="schMonths" value="0" min="0" max="12" oninput="calcFee()">
            </div>
          </div>

          <div class="fg">
            <label>Trạng thái thanh toán</label>
            <div class="pay-row">
              <div class="pay-opt selected" id="ps_pending" onclick="selectPayStatus('pending')">Chờ đóng</div>
              <div class="pay-opt"          id="ps_deposit" onclick="selectPayStatus('deposit')">Đặt cọc</div>
              <div class="pay-opt"          id="ps_paid"    onclick="selectPayStatus('paid')">Đã đóng đủ</div>
            </div>
          </div>

          <div class="fg2" id="payAmtRow" style="display:none">
            <div>
              <label id="payAmtLabel">Số tiền cọc</label>
              <input type="number" class="form-control" id="payAmt" value="0" oninput="calcFee()">
            </div>
            <div style="display:flex;align-items:flex-end;padding-bottom:2px">
              <span style="font-size:12px;color:var(--text-secondary)">Số tiền phụ huynh đã đóng</span>
            </div>
          </div>

          <div class="fg">
            <label>Ghi chú</label>
            <textarea class="form-control" id="rnwNote" rows="2" placeholder="Ghi chú thêm..."></textarea>
          </div>

          <!-- Fee summary -->
          <div class="fee-sum">
            <div class="fee-row"><span>Học phí gốc</span><span id="fsBase">0đ</span></div>
            <div class="fee-row"><span>Giảm KM</span><span id="fsDisc">-0đ</span></div>
            <div class="fee-row"><span>Học bổng</span><span id="fsSchol">+0 buổi</span></div>
            <div class="fee-row"><span>Đã đóng</span><span id="fsPaid">0đ</span></div>
            <div class="fee-row"><span>Còn phải đóng</span><span id="fsRemain">0đ</span></div>
          </div>
        </div>
      </div>`;
  }

  function bindFormEvents() {
    // nothing extra needed — all onclick inline
  }

  function selectPkg(id) {
    selPkg = packages.find(p => p.id === id);
    document.querySelectorAll('.pkg-opt').forEach(el => el.classList.remove('selected'));
    document.getElementById('pkg_'+id)?.classList.add('selected');
    if (payStatus === 'paid') {
      document.getElementById('payAmt').value = calcFinalPrice();
    }
    calcFee();
  }

  function selectRType(t) {
    rType = t;
    ['extend','new'].forEach(v => document.getElementById('rt_'+v)?.classList.toggle('selected', v===t));
    const fg = document.getElementById('newClassFg');
    if (fg) fg.style.display = t==='new' ? 'block' : 'none';
  }

  function selectPayStatus(s) {
    payStatus = s;
    ['pending','deposit','paid'].forEach(v => document.getElementById('ps_'+v)?.classList.toggle('selected', v===s));
    const row   = document.getElementById('payAmtRow');
    const label = document.getElementById('payAmtLabel');
    if (!row) return;
    if (s === 'pending') {
      row.style.display = 'none';
    } else {
      row.style.display = 'grid';
      if (label) label.textContent = s==='deposit' ? 'Số tiền cọc' : 'Số tiền đã đóng';
      if (s==='paid' && selPkg) document.getElementById('payAmt').value = calcFinalPrice();
    }
    calcFee();
  }

  function calcFinalPrice() {
    if (!selPkg) return 0;
    const base = parseFloat(selPkg.price || selPkg.base_price) || 0;
    const opt  = document.getElementById('promoSel');
    const sel  = opt?.options[opt.selectedIndex];
    let disc = 0;
    if (sel?.value) {
      const dt = sel.dataset.type, dv = parseFloat(sel.dataset.val)||0;
      disc = dt==='percent' ? Math.round(base*dv/100) : dv;
    }
    return Math.max(0, base - disc);
  }

  function calcFee() {
    const base  = selPkg ? (parseFloat(selPkg.price||selPkg.base_price)||0) : 0;
    const final = calcFinalPrice();
    const disc  = base - final;
    const schM  = parseInt(document.getElementById('schMonths')?.value)||0;
    const paid  = payStatus==='pending' ? 0 : (parseFloat(document.getElementById('payAmt')?.value)||0);
    const remain= Math.max(0, final - paid);

    const set = (id, v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
    set('fsBase',   fmtCur(base));
    set('fsDisc',   disc>0 ? '-'+fmtCur(disc) : '-0đ');
    set('fsSchol',  '+'+schM*4+' buổi ('+ schM+' tháng)');
    set('fsPaid',   fmtCur(paid));
    set('fsRemain', fmtCur(remain));
  }

  async function submitRenewal() {
    if (!curStudent||!selPkg) { notify.warning('Vui lòng chọn gói học'); return; }
    if (rType==='new' && !document.getElementById('newClassSel')?.value) {
      notify.warning('Vui lòng chọn lớp mới'); return;
    }
    const btn = document.getElementById('rnwSubmitBtn');
    const paidAmt = payStatus==='pending' ? 0 : (parseFloat(document.getElementById('payAmt')?.value)||0);
    const data = {
      student_id:         curStudent.id,
      package_id:         selPkg.id,
      renewal_type:       rType,
      new_class_id:       rType==='new' ? document.getElementById('newClassSel')?.value : null,
      promotion_id:       document.getElementById('promoSel')?.value || null,
      scholarship_months: parseInt(document.getElementById('schMonths')?.value)||0,
      deposit_amount:     payStatus==='deposit' ? paidAmt : 0,
      paid_amount:        paidAmt,
      payment_status:     payStatus,
      note:               document.getElementById('rnwNote')?.value
    };
    loading.buttonStart(btn, 'Đang xử lý...');
    try {
      await api.post('/renewals', data);
      notify.success('Tái phí thành công!');
      // Update local status
      const idx = allStudents.findIndex(s => s.id === curStudent.id);
      if (idx >= 0) allStudents[idx].status = 'renewed';
      curStudent.status = 'renewed';
      renderList();
      renderDetail();
    } catch(e) {
      notify.error(e.message || 'Có lỗi xảy ra');
    } finally {
      loading.buttonEnd(btn);
    }
  }

  function fmtCur(v) {
    if (!v && v!==0) return '0đ';
    return new Intl.NumberFormat('vi-VN').format(v) + 'đ';
  }

  window.addEventListener('branchchange', e => {
    const sel = document.getElementById('fBranch');
    if (sel) sel.value = e.detail?.branch?.id || '';
    loadData();
  });
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
